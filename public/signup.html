<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ثبت‌نام</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <link rel="stylesheet" href="./styles/app.css" />

    <!-- Alpine -->
    <script defer src="./scripts/alpine.min.js"></script>
  </head>

  <body>
    <svg class="hidden">
      <!-- x-mark -->
      <symbol
        id="x-mark"
        xmlns="http://www.w3.org/2000/svg"
        fill="none"
        viewBox="0 0 24 24"
        stroke-width="1.5"
        stroke="currentColor"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M6 18 18 6M6 6l12 12"
        />
      </symbol>

      <!-- chevron left -->
      <symbol
        id="chevron-left"
        xmlns="http://www.w3.org/2000/svg"
        fill="none"
        viewBox="0 0 24 24"
        stroke-width="1.5"
        stroke="currentColor"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M15.75 19.5 8.25 12l7.5-7.5"
        />
      </symbol>

      <!-- eye-slash -->
      <symbol
        id="eye-slash"
        xmlns="http://www.w3.org/2000/svg"
        fill="none"
        viewBox="0 0 24 24"
        stroke-width="1.5"
        stroke="currentColor"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M3.98 8.223A10.477 10.477 0 0 0 1.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.451 10.451 0 0 1 12 4.5c4.756 0 8.773 3.162 10.065 7.498a10.522 10.522 0 0 1-4.293 5.774M6.228 6.228 3 3m3.228 3.228 3.65 3.65m7.894 7.894L21 21m-3.228-3.228-3.65-3.65m0 0a3 3 0 1 0-4.243-4.243m4.242 4.242L9.88 9.88"
        />
      </symbol>

      <!-- eye -->
      <symbol
        id="eye"
        xmlns="http://www.w3.org/2000/svg"
        fill="none"
        viewBox="0 0 24 24"
        stroke-width="1.5"
        stroke="currentColor"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z"
        />
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"
        />
      </symbol>

      <symbol
        id="arrow-left"
        xmlns="http://www.w3.org/2000/svg"
        fill="none"
        viewBox="0 0 24 24"
        stroke-width="1.5"
        stroke="currentColor"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18"
        />
      </symbol>
      <!-- Login -->
      <symbol
        id="login"
        xmlns="http://www.w3.org/2000/svg"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="1.5"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <path
          d="M15 3H19C20.1 3 21 3.9 21 5V19C21 20.1 20.1 21 19 21H15"
        ></path>
        <path d="M10 17L15 12L10 7"></path>
        <path d="M15 12H3"></path>
      </symbol>
      <!-- Bars 3 -->
      <symbol
        id="bars-3"
        xmlns="http://www.w3.org/2000/svg"
        fill="none"
        viewBox="0 0 24 24"
        stroke-width="1.5"
        stroke="currentColor"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5"
        />
      </symbol>
    </svg>
    <!-- Header -->
    <header
      class="fixed top-0 right-0 left-0 shadow-sm hidden lg:flex z-10 bg-white"
    >
      <!-- Container -->
      <div class="container px-4 md:px-8 mx-auto h-20">
        <div class="flex items-center justify-between h-full">
          <!-- Nav -->
          <nav class="flex items-center gap-x-10">
            <!-- Logo/title -->
            <div class="flex items-center gap-x-2">
              <!-- Bars 3 -->
              <div class="flex lg:hidden">
                <svg class="w-5 h-5">
                  <use href="#bars-3"></use>
                </svg>
              </div>
              <!-- Logo -->
              <img
                src="./images/pasargad/Logo-removebg-preview.png"
                alt="لوگو"
                title="بیمه پاسارگاد"
                loading="lazy"
                class="w-15 h-15 hidden lg:block"
              />
              <!-- Title -->
              <div class="flex flex-col">
                <span class="text-xl font-bold text-zinc-800"
                  >ستارگان پیشرو</span
                >
                <span class="text-xs text-blue-700 leading-3"
                  >بیمه پاسارگاد</span
                >
              </div>
            </div>
          </nav>
          <!-- Menu -->
          <ul
            class="hidden lg:flex items-center gap-x-7 lg:gap-x-10 child:transition-colors font-medium text-zinc-700 child:hover:text-blue-700"
          >
            <li>
              <a href="index.html">خانه</a>
            </li>
            <li>
              <a href="#">مدیران کل</a>
            </li>
            <li>
              <a href="#">انواع بیمه</a>
            </li>
            <li>
              <a href="#">درباره ما</a>
            </li>
            <li>
              <a href="#">تماس</a>
            </li>
          </ul>
          <div class="text-sm">
            <a
              href="#"
              class="flex items-center gap-x-1 text-white py-3 px-3 shadow-md rounded-full bg-blue-500 transition-all hover:-translate-y-1 hover:shadow-blue-500/50"
            >
              <svg class="w-5 h-5">
                <use href="#login"></use>
              </svg>
              <span class="hidden lg:flex">ورود</span>
              <span class="text-white/50 hidden lg:flex">|</span>
              <span>ثبت نام</span>
            </a>
          </div>
        </div>
      </div>
    </header>
    <!-- Mobile Navbar -->
    <div class="shadow fixed top-0 left-0 right-0 bg-white z-10 lg:hidden">
      <div class="container px-4 lg:px-8 mx-auto h-20">
        <div class="flex justify-between items-center h-full">
          <!-- Bars 3 -->
          <div class="cursor-pointer open-nav-mobile-btn">
            <svg class="w-5 h-5">
              <use href="#bars-3"></use>
            </svg>
          </div>
          <!-- Logo/Title -->
          <div class="flex items-center gap-x-1">
            <img
              src="./images/pasargad/Logo-removebg-preview.png"
              alt="لوگو"
              class="w-15 h-15"
            />
            <div class="flex flex-col">
              <span class="text-base font-bold text-zinc-800"
                >ستارگان پیشرو</span
              >
              <span class="text-[0.6rem] text-blue-700 leading-3"
                >بیمه پاسارگاد</span
              >
            </div>
          </div>
          <!-- Register Button -->
          <a
            href="#"
            class="flex items-center gap-x-1 cursor-pointer text-sm text-white py-2 px-3 shadow-lg rounded-full bg-blue-500 transition-all hover:-translate-y-1 hover:shadow-blue-500/50"
          >
            <svg class="w-4 h-4">
              <use href="#login"></use>
            </svg>
            <span class="text-xs">ورود</span>
          </a>
        </div>
      </div>
    </div>
    <!-- Mobile Nav Menu -->
    <div
      class="nav-mobile fixed top-0 bottom-0 -right-64 z-50 my-2 w-64 bg-white py-4 p-3 rounded-2xl shadow-lg transition-all duration-500"
    >
      <!-- Nav Header -->
      <div
        class="flex justify-between items-center pb-5 mb-5 border-b border-gray-100"
      >
        <div class="flex items-center gap-x-2">
          <img
            src="./images/pasargad/Logo-removebg-preview.png"
            alt="لوگو"
            title="بیمه پاسارگاد"
            class="w-8 h-8"
            loading="lazy"
          />
          <div class="flex flex-col">
            <span class="text-sm font-bold text-zinc-800">ستارگان پیشرو</span>
            <span class="text-xs text-blue-700 leading-3">بیمه پاسارگاد</span>
          </div>
        </div>
        <div class="close-nav-mobile-btn bg-red-50 text-red-400 rounded-md">
          <svg class="w-5 h-5">
            <use href="#x-mark"></use>
          </svg>
        </div>
      </div>
      <!-- Nav Body -->
      <div class>
        <!-- Menu -->
        <div
          class="flex flex-col space-y-2 text-sm bg-gray-50 p-2 rounded-2xl text-zinc-700 child:py-2 child:px-2"
        >
          <a
            href="index.html"
            class="flex items-center justify-between gap-x-1"
          >
            <span class="flex items-center gap-x-2">
              <svg class="w-4 h-4">
                <use href="#home"></use>
              </svg>
              <span>خانه</span>
            </span>
            <svg class="w-4 h-4">
              <use href="#chevron-left"></use>
            </svg>
          </a>
          <a href="#" class="flex items-center justify-between gap-x-1">
            <span class="flex items-center gap-x-2">
              <svg class="w-4 h-4">
                <use href="#user-shield"></use>
              </svg>
              <span>مدیران</span>
            </span>
            <svg class="w-4 h-4">
              <use href="#chevron-left"></use>
            </svg>
          </a>
          <a href="#" class="flex items-center justify-between gap-x-1">
            <span class="flex items-center gap-x-2">
              <svg class="w-4 h-4">
                <use href="#notebook"></use>
              </svg>
              <span>انواع بیمه</span>
            </span>
            <svg class="w-4 h-4">
              <use href="#chevron-left"></use>
            </svg>
          </a>
          <a href="#" class="flex items-center justify-between gap-x-1">
            <span class="flex items-center gap-x-2">
              <svg class="w-4 h-4">
                <use href="#team"></use>
              </svg>
              <span>نمایندگان</span>
            </span>
            <svg class="w-4 h-4">
              <use href="#chevron-left"></use>
            </svg>
          </a>
          <a href="#" class="flex items-center justify-between gap-x-1">
            <span class="flex items-center gap-x-2">
              <svg class="w-4 h-4">
                <use href="#information-circle"></use>
              </svg>
              <span>درباره ما</span>
            </span>
            <svg class="w-4 h-4">
              <use href="#chevron-left"></use>
            </svg>
          </a>
          <a href="#" class="flex items-center justify-between gap-x-1">
            <span class="flex items-center gap-x-2">
              <svg class="w-4 h-4">
                <use href="#contact "></use>
              </svg>
              <span>تماس</span>
            </span>
            <svg class="w-4 h-4">
              <use href="#chevron-left"></use>
            </svg>
          </a>
        </div>
      </div>
    </div>
    <div class="h-20"></div>
    <!-- Main -->
    <main>
      <section class="mt-20 px-4">
        <div
          class="w-full max-w-160 p-5 pb-6 mx-auto rounded-2xl border border-gray-200 shadow-md bg-white"
        >
          <!-- Head -->
          <div class="flex justify-between items-center">
            <h3
              class="flex items-center gap-x-2 text-2xl font-medium text-blue-500"
            >
              <!-- <svg class="w-5 h-5">
                <use href="#login"></use>
              </svg> -->
              <span>ثبت‌نام</span>
            </h3>
            <a
              href="index.html"
              class="flex items-center gap-x-1 text-xs text-gray-500"
            >
              <span>بازگشت</span>
              <svg class="w-3 h-3">
                <use href="#arrow-left"></use>
              </svg>
            </a>
          </div>

          <!-- Form -->
          <form x-data="passwordVisible" action="#" class="mt-7 space-y-5">
            <!-- Grid -->
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
              <!-- Name/Family -->
              <div class="flex flex-col gap-y-2">
                <label for="" class="text-xs text-gray-700"
                  >نام و نام‌خانوادگی</label
                >
                <input
                  type="text"
                  name="fullname"
                  class="w-full py-2.5 px-4 text-xs bg-white rounded-md outline-none border border-gray-200"
                  placeholder="نام و نام‌خانوادگی خود را وارد کنید..."
                />
              </div>
              <!-- Email -->
              <div class="flex flex-col gap-y-2">
                <label for="" class="text-xs text-gray-700">ایمیل</label>
                <input
                  type="email"
                  name="email"
                  class="w-full py-2.5 px-4 text-xs bg-white rounded-md outline-none border border-gray-200"
                  placeholder="ایمیل خود را وارد کنید..."
                />
              </div>
              <!-- Mobile -->
              <div class="flex flex-col gap-y-2">
                <label for="" class="text-xs text-gray-700">شماره تلفن</label>
                <input
                  type="text"
                  name="mobile"
                  class="w-full py-2.5 px-4 text-xs bg-white rounded-md outline-none border border-gray-200"
                  placeholder="شماره خود را وارد کنید..."
                />
              </div>
              <!-- Password -->
              <div class="flex flex-col gap-y-2">
                <label for="" class="text-xs text-gray-700">رمزعبور</label>
                <div
                  class="flex items-center border border-gray-200 rounded-md overflow-hidden"
                >
                  <!-- Show Password -->
                  <span
                    @click="toggle()"
                    class="flex items-center justify-center w-8 h-[80%] mr-1 bg-gray-50 border border-gray-100 text-gray-500 rounded-md cursor-pointer"
                  >
                    <svg x-show="!passType" x-cloak class="w-3 h-3 mx-auto">
                      <use href="#eye"></use>
                    </svg>
                    <svg x-show="passType" x-cloak class="w-3 h-3 mx-auto">
                      <use href="#eye-slash"></use>
                    </svg>
                  </span>
                  <input
                    :type="type()"
                    name="password"
                    class="w-full py-2.5 px-2.5 text-xs bg-white outline-none"
                    placeholder="رمزعبور خود را وارد کنید..."
                  />
                </div>
              </div>
            </div>
            <div class="flex items-center gap-x-1">
              <input type="checkbox" id="rules" class="cursor-pointer"/>
              <label for="rules" class="text-xs text-gray-700 cursor-pointer">شرایط و قوانین سایت را می پذیرم!</label>
            </div>
            <div class="flex gap-x-5 mt-9">
              <button
                type="submit"
                class="flex items-center justify-center gap-x-1 w-1/2 py-2 rounded-md shadow-sm text-sm cursor-pointer bg-blue-500 text-white"
              >
                <svg class="w-4 h-4">
                  <use href="#login"></use>
                </svg>
                <span>ثبت‌نام</span>
              </button>
              <a
                href="login.html"
                class="flex items-center justify-center gap-x-1 w-fit py-2 rounded-md text-sm font-light text-center text-blue-500"
                ><span>ورود</span>
                <svg class="w-3 h-3">
                  <use href="#chevron-left"></use>
                </svg>
              </a>
            </div>
          </form>
        </div>
      </section>
    </main>
    <div class="overlay"></div>
    <!-- Swiper -->
    <script src="./scripts/swiper-bundle.min.js"></script>
    <!-- My Script -->
    <script src="./scripts/login.js"></script>
  </body>
</html>
